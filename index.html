<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexPhora - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #22d3ee;
      --cyan-dim: #0e7490;
      --red: #f43f5e;
      --bg: #080d14;
      --surface: #0f1923;
      --surface2: #162030;
      --border: rgba(34,211,238,0.15);
      --text: #e2e8f0;
      --muted: #64748b;
      --white: #f8fafc;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: orbPulse 6s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(34,211,238,0.06); top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(244,63,94,0.05); bottom: -50px; right: -50px; animation-delay: -3s; }

    @keyframes orbPulse {
      from { opacity: 0.5; transform: scale(1); }
      to { opacity: 1; transform: scale(1.1); }
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,20,0.8);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    header .logo-icon {
      font-size: 22px;
    }

    header .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--cyan);
      letter-spacing: -0.5px;
    }

    header .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-left: auto;
    }

    /* Main wrapper */
    .login-wrapper {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 480px;
      padding: 1rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
    }

    .login-header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    /* Role selector */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .role-btn {
      padding: 1rem;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.5px;
    }

    .role-btn .role-icon {
      font-size: 1.6rem;
    }

    .role-btn.active {
      background: var(--surface2);
      color: var(--cyan);
      box-shadow: inset 0 -2px 0 var(--cyan);
    }

    .role-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    input[type="tel"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 12px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--cyan);
    }

    /* OTP inputs */
    .otp-grid {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 1rem 0;
    }

    .otp-input {
      width: 52px !important;
      height: 52px;
      text-align: center;
      font-size: 1.4rem !important;
      font-weight: 600;
      padding: 0 !important;
      border-radius: 10px !important;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--white);
      outline: none;
    }

    .otp-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(34,211,238,0.15);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      background: #67e8f9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .otp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
    }

    .otp-note {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin: 0.5rem 0;
    }

    .otp-note span {
      color: var(--cyan);
    }

    /* Alert messages */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.error {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      color: #fb7185;
    }

    .alert.success {
      background: rgba(34,211,238,0.08);
      border: 1px solid rgba(34,211,238,0.2);
      color: var(--cyan);
    }

    .alert.show { display: block; }

    /* Step indicator */
    .steps {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--muted);
      transition: all 0.3s;
    }

    .step-dot.active {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .step-dot.done {
      background: var(--cyan-dim);
      border-color: var(--cyan-dim);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.2rem 0;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Attendant badge */
    .attendant-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.7rem;
      color: #fb7185;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }

    .attendant-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f43f5e;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Hidden */
    .hidden { display: none !important; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .timer {
      color: var(--cyan);
      font-size: 0.8rem;
      font-weight: 500;
    }

    footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      z-index: 5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <header>
    <span class="logo-icon">🚑</span>
    <span class="logo-text">NexPhora</span>
    <span class="tagline">Emergency Response System</span>
  </header>

  <div class="login-wrapper">
    <div class="login-header">
      <h2>Secure Access</h2>
      <p>Sign in to continue to NexPhora</p>
    </div>

    <!-- Role Toggle -->
    <div class="role-selector">
      <button class="role-btn active" id="userRoleBtn" onclick="switchRole('user')">
        <span class="role-icon">🧑‍💼</span>
        USER
      </button>
      <button class="role-btn" id="attendantRoleBtn" onclick="switchRole('attendant')">
        <span class="role-icon">🚑</span>
        ATTENDANT
      </button>
    </div>

    <div class="card">
      <!-- Alert -->
      <div class="alert error" id="alertBox"></div>
      <div class="alert success" id="successBox"></div>

      <!-- Step 1: Credentials -->
      <div id="step1">
        <div class="steps">
          <span class="step-dot active" id="dot1"></span>
          <span>Credentials</span>
          <span style="margin-left:auto; color: var(--muted);">Step 1 of 2</span>
        </div>

        <div id="attendantBadgeWrap" class="hidden">
          <div class="attendant-badge">ATTENDANT ACCESS · HIGH PRIVILEGE</div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="passwordInput" placeholder="••••••••">
        </div>

        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
          Continue →
        </button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step2" class="hidden">
        <div class="steps">
          <span class="step-dot done" id="dot1b"></span>
          <span class="step-dot active"></span>
          <span>OTP Verification</span>
          <span style="margin-left:auto; color: var(--muted);">Step 2 of 2</span>
        </div>

        <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem;">
          A 6-digit code has been sent to
        </p>
        <p style="font-weight: 500; color: var(--white); margin-bottom: 1.2rem;" id="emailDisplay"></p>

        <div class="otp-grid">
          <input class="otp-input" type="tel" maxlength="1" id="otp0" oninput="otpNext(this,0)" onkeydown="otpBack(event,0)">
          <input class="otp-input" type="tel" maxlength="1" id="otp1" oninput="otpNext(this,1)" onkeydown="otpBack(event,1)">
          <input class="otp-input" type="tel" maxlength="1" id="otp2" oninput="otpNext(this,2)" onkeydown="otpBack(event,2)">
          <input class="otp-input" type="tel" maxlength="1" id="otp3" oninput="otpNext(this,3)" onkeydown="otpBack(event,3)">
          <input class="otp-input" type="tel" maxlength="1" id="otp4" oninput="otpNext(this,4)" onkeydown="otpBack(event,4)">
          <input class="otp-input" type="tel" maxlength="1" id="otp5" oninput="otpNext(this,5)" onkeydown="otpBack(event,5)">
        </div>

        <p class="otp-note">Demo OTP: <span id="demoOTPDisplay">------</span></p>

        <div class="otp-row">
          <button class="btn-secondary" onclick="goBack()">← Back</button>
          <span class="timer" id="timerDisplay">Resend in 30s</span>
        </div>

        <div style="margin-top: 1rem;">
          <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
            Verify & Sign In
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer>© 2025 NexPhora · AI Emergency Response · Secure Login</footer>

  <script>
    // ─── State ───────────────────────────────────────────────
    let currentRole = 'user';
    let demoOTP = '';
    let timerInterval = null;

    // Demo credentials
    const credentials = {
      user: { email: 'user@nexphora.in', password: 'User@123' },
      attendant: { email: 'attendant@nexphora.in', password: 'Att@123' }
    };

    // ─── Role Switch ─────────────────────────────────────────
    function switchRole(role) {
      currentRole = role;
      document.getElementById('userRoleBtn').classList.toggle('active', role === 'user');
      document.getElementById('attendantRoleBtn').classList.toggle('active', role === 'attendant');
      document.getElementById('attendantBadgeWrap').classList.toggle('hidden', role === 'user');
      clearAlerts();
      goBack();
    }

    // ─── Step 1: Login ────────────────────────────────────────
    function handleLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const creds = credentials[currentRole];

      clearAlerts();

      if (!email || !password) {
        return showError('Please fill in both fields.');
      }

      if (email !== creds.email || password !== creds.password) {
        return showError('Invalid email or password. Try: ' + creds.email + ' / ' + creds.password);
      }

      // Generate OTP
      demoOTP = String(Math.floor(100000 + Math.random() * 900000));
      document.getElementById('demoOTPDisplay').textContent = demoOTP;
      document.getElementById('emailDisplay').textContent = email;

      // Show step 2
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');

      // Clear OTP inputs
      for (let i = 0; i < 6; i++) document.getElementById('otp' + i).value = '';
      document.getElementById('otp0').focus();

      startTimer(30);
    }

    // ─── OTP Input Handling ───────────────────────────────────
    function otpNext(el, idx) {
      el.value = el.value.replace(/\D/g, '');
      if (el.value.length === 1 && idx < 5) {
        document.getElementById('otp' + (idx + 1)).focus();
      }
      clearAlerts();
    }

    function otpBack(e, idx) {
      if (e.key === 'Backspace' && !document.getElementById('otp' + idx).value && idx > 0) {
        document.getElementById('otp' + (idx - 1)).focus();
      }
    }

    // ─── Timer ───────────────────────────────────────────────
    function startTimer(seconds) {
      let s = seconds;
      const display = document.getElementById('timerDisplay');
      display.textContent = 'Resend in ' + s + 's';

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        s--;
        if (s <= 0) {
          clearInterval(timerInterval);
          display.innerHTML = '<button class="btn-secondary" onclick="resendOTP()" style="cursor:pointer;">Resend OTP</button>';
        } else {
          display.textContent = 'Resend in ' + s + 's';
        }
      }, 1000);
    }

    function resendOTP() {
      demoOTP = String(Math.floor(100000 + Math.random() * 900000));
      document.getElementById('demoOTPDisplay').textContent = demoOTP;
      showSuccess('New OTP sent!');
      startTimer(30);
    }

    // ─── Verify OTP ───────────────────────────────────────────
    function verifyOTP() {
      let entered = '';
      for (let i = 0; i < 6; i++) entered += document.getElementById('otp' + i).value;

      if (entered.length < 6) return showError('Please enter all 6 digits.');

      if (entered !== demoOTP) {
        return showError('Incorrect OTP. Check the demo code shown above.');
      }

      // Animate success
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      setTimeout(() => {
        if (currentRole === 'user') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'attendant.html';
        }
      }, 1200);
    }

    // ─── Back ─────────────────────────────────────────────────
    function goBack() {
      clearInterval(timerInterval);
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
      clearAlerts();
    }

    // ─── Alerts ───────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successBox');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    function clearAlerts() {
      document.getElementById('alertBox').classList.remove('show');
      document.getElementById('successBox').classList.remove('show');
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (!document.getElementById('step1').classList.contains('hidden')) handleLogin();
        else verifyOTP();
      }
    });
  </script>
</body>
</html>
